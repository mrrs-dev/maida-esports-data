<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0F1115">
<title>MAIDA Admin</title>
<style>
  :root {
    --bg: #0F1115;
    --surface: #1A1D24;
    --surface-2: #242832;
    --border: rgba(255,255,255,0.08);
    --text: #F5F5F7;
    --muted: #9DA3AE;
    --brand: #FFB703;
    --brand-deep: #FF8500;
    --good: #28C26B;
    --bad: #FF4757;
    --live: #FF4757;
    --upcoming: #5B8DEF;
    --completed: #6C757D;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 80px) env(safe-area-inset-left); }

  header.top {
    position: sticky; top: 0; z-index: 10;
    background: linear-gradient(135deg, #1F1B2E 0%, #2D1B3D 60%, #0F1115 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 16px 12px;
  }
  .brand {
    font-size: 22px; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(180deg, #fff 0%, var(--brand) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
  .who { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--brand); margin-top: 6px; text-transform: uppercase; }

  .tabs {
    display: flex; gap: 8px; padding: 12px 16px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 80px; z-index: 9;
  }
  .tab {
    padding: 10px 14px; font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--muted); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--brand); border-bottom-color: var(--brand); }

  main { padding: 16px; max-width: 720px; margin: 0 auto; }

  .gate {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px 20px; text-align: center; margin-top: 40px;
  }
  .gate h2 { margin: 0 0 8px; font-size: 18px; }
  .gate p { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  input.code, input.text {
    width: 100%; padding: 14px 16px; font-size: 17px;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 12px;
    text-align: center; letter-spacing: 4px; font-weight: 700;
    outline: none;
  }
  input.code:focus, input.text:focus { border-color: var(--brand); }

  button.primary {
    width: 100%; margin-top: 16px; padding: 14px;
    background: linear-gradient(180deg, var(--brand) 0%, var(--brand-deep) 100%);
    color: #1A1300; font-weight: 800; font-size: 16px; letter-spacing: 0.5px;
    border: none; border-radius: 12px; cursor: pointer;
    min-height: 50px;
  }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost {
    background: var(--surface-2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 13px; font-weight: 700; cursor: pointer;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
    transition: border-color 0.2s, background 0.2s;
  }
  .card.saved { border-color: var(--good); }
  .card.error { border-color: var(--bad); }
  .row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .stage { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; }
  .badge {
    font-size: 10px; font-weight: 800; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 999px; text-transform: uppercase;
  }
  .badge.live { background: rgba(255,71,87,0.15); color: var(--live); }
  .badge.upcoming { background: rgba(91,141,239,0.15); color: var(--upcoming); }
  .badge.completed { background: rgba(108,117,125,0.18); color: var(--completed); }

  .matchup {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px;
    margin-bottom: 14px;
  }
  .side { display: flex; flex-direction: column; }
  .side.away { align-items: flex-end; }
  .tag { font-size: 17px; font-weight: 900; letter-spacing: 1px; }
  .name { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .vs { font-size: 12px; font-weight: 800; color: var(--muted); padding: 0 8px; }

  .scoring {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 12px;
  }
  .score {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 6px;
  }
  .score input {
    flex: 1; min-width: 0; padding: 14px 4px; text-align: center;
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 28px; font-weight: 900; font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .score input::-webkit-outer-spin-button, .score input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper {
    width: 38px; height: 38px; border-radius: 9px; border: none;
    background: var(--surface); color: var(--brand);
    font-size: 22px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .stepper:active { background: var(--brand); color: #000; }

  select.status {
    width: 100%; padding: 12px; border-radius: 10px;
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--border); font-size: 14px; font-weight: 700;
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%239DA3AE' d='M6 8L0 0h12z'/></svg>");
    background-repeat: no-repeat; background-position: right 14px center;
    margin-bottom: 12px;
  }

  .actions { display: flex; gap: 8px; }
  .actions button { flex: 1; }

  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 12px 20px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.good { border-color: var(--good); color: var(--good); }
  .toast.bad { border-color: var(--bad); color: var(--bad); }

  .standings-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px;
    display: grid; grid-template-columns: 28px 1fr auto auto auto; gap: 10px; align-items: center;
  }
  .standings-row.saved { border-color: var(--good); }
  .rank { font-weight: 900; color: var(--muted); font-variant-numeric: tabular-nums; text-align: center; }
  .team-name { font-weight: 700; font-size: 14px; }
  .stat-input {
    width: 64px; padding: 8px 6px; text-align: center;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-weight: 800; font-variant-numeric: tabular-nums;
    font-size: 15px; outline: none;
  }
  .stat-input:focus { border-color: var(--brand); }

  .footer-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
    display: flex; gap: 10px; align-items: center; justify-content: space-between;
    z-index: 50;
  }
  .footer-bar .info { font-size: 12px; color: var(--muted); }
  .footer-bar button.primary { width: auto; flex: 0 0 auto; padding: 12px 24px; }

  .skeleton { background: var(--surface); border-radius: 14px; height: 120px; margin-bottom: 12px; animation: pulse 1.4s infinite ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 0.85; } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="top">
  <div class="brand">MAIDA eSPORTS</div>
  <div class="subtitle">Admin Console</div>
  <div class="who" id="whoBar" style="display:none">Signed in <button class="ghost" id="signOut" style="margin-left:8px;padding:4px 10px;font-size:11px">Sign out</button></div>
</header>

<nav class="tabs" id="tabs" style="display:none">
  <button class="tab active" data-tab="matches">Matches</button>
  <button class="tab" data-tab="standings">Standings</button>
</nav>

<main>
  <!-- Passcode gate -->
  <section id="gate" class="gate">
    <h2>Enter admin passcode</h2>
    <p>Ask your tournament organizer for the code.</p>
    <input type="password" inputmode="numeric" autocomplete="off" class="code" id="codeInput" placeholder="••••••••" />
    <button class="primary" id="enterBtn">Enter</button>
  </section>

  <!-- Matches tab -->
  <section id="matchesPane" class="hidden">
    <div id="matchesList"></div>
  </section>

  <!-- Standings tab -->
  <section id="standingsPane" class="hidden">
    <div id="standingsList"></div>
    <button class="primary" id="saveStandingsBtn" style="margin-top:8px">Save standings</button>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
const API_BASE = "";
const state = {
  code: sessionStorage.getItem("maida_code") || "",
  teams: [],
  matches: [],
  standings: [],
  teamById: {},
  dirtyMatches: new Set(),
  dirtyStandings: false,
  tab: "matches"
};

const $ = (sel) => document.querySelector(sel);
const toast = (msg, kind = "good") => {
  const t = $("#toast");
  t.textContent = msg;
  t.className = `toast show ${kind}`;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 2400);
};

async function loadData() {
  const [teams, schedule, standings] = await Promise.all([
    fetch("/data/teams.json", { cache: "no-store" }).then(r => r.json()),
    fetch("/data/schedule.json", { cache: "no-store" }).then(r => r.json()),
    fetch("/data/standings.json", { cache: "no-store" }).then(r => r.json())
  ]);
  state.teams = teams;
  state.matches = schedule;
  state.standings = standings;
  state.teamById = Object.fromEntries(teams.map(t => [t.id, t]));
}

function renderMatches() {
  const list = $("#matchesList");
  if (!state.matches.length) { list.innerHTML = "<p>No matches.</p>"; return; }
  const sorted = [...state.matches].sort((a,b) => new Date(a.start_time) - new Date(b.start_time));
  list.innerHTML = sorted.map(m => matchCard(m)).join("");
  list.querySelectorAll("[data-match]").forEach(el => wireMatch(el));
}

function matchCard(m) {
  const home = state.teamById[m.home_team_id] || { tag: "?", name: "?" };
  const away = state.teamById[m.away_team_id] || { tag: "?", name: "?" };
  const t = new Date(m.start_time);
  const timeStr = t.toLocaleString([], { weekday: "short", hour: "numeric", minute: "2-digit" });
  return `
    <div class="card" data-match="${m.id}">
      <div class="row1">
        <span class="stage">${escapeHtml(m.stage)} • Bo${m.best_of} • ${timeStr}</span>
        <span class="badge ${m.status}">${m.status}</span>
      </div>
      <div class="matchup">
        <div class="side">
          <div class="tag">${escapeHtml(home.tag)}</div>
          <div class="name">${escapeHtml(home.name)}</div>
        </div>
        <div class="vs">vs</div>
        <div class="side away">
          <div class="tag">${escapeHtml(away.tag)}</div>
          <div class="name">${escapeHtml(away.name)}</div>
        </div>
      </div>
      <div class="scoring">
        <div class="score">
          <button class="stepper" data-act="dec-home">−</button>
          <input type="number" inputmode="numeric" min="0" data-field="home_score" value="${m.home_score ?? 0}">
          <button class="stepper" data-act="inc-home">+</button>
        </div>
        <div class="score">
          <button class="stepper" data-act="dec-away">−</button>
          <input type="number" inputmode="numeric" min="0" data-field="away_score" value="${m.away_score ?? 0}">
          <button class="stepper" data-act="inc-away">+</button>
        </div>
      </div>
      <select class="status" data-field="status">
        <option value="upcoming" ${m.status==="upcoming"?"selected":""}>Upcoming</option>
        <option value="live" ${m.status==="live"?"selected":""}>Live</option>
        <option value="completed" ${m.status==="completed"?"selected":""}>Final</option>
      </select>
      <div class="actions">
        <button class="primary" data-act="save">Save match</button>
      </div>
    </div>`;
}

function wireMatch(card) {
  const id = card.dataset.match;
  const home = card.querySelector("[data-field=home_score]");
  const away = card.querySelector("[data-field=away_score]");
  const status = card.querySelector("[data-field=status]");

  card.querySelector("[data-act=inc-home]").onclick = () => { home.value = (+home.value || 0) + 1; };
  card.querySelector("[data-act=dec-home]").onclick = () => { home.value = Math.max(0, (+home.value || 0) - 1); };
  card.querySelector("[data-act=inc-away]").onclick = () => { away.value = (+away.value || 0) + 1; };
  card.querySelector("[data-act=dec-away]").onclick = () => { away.value = Math.max(0, (+away.value || 0) - 1); };

  card.querySelector("[data-act=save]").onclick = async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true; btn.textContent = "Saving…";
    const m = state.matches.find(x => x.id === id);
    const next = { ...m,
      home_score: +home.value, away_score: +away.value, status: status.value
    };
    if (next.status !== "completed" && next.home_score === 0 && next.away_score === 0) {
      next.home_score = null; next.away_score = null;
    }
    const newSchedule = state.matches.map(x => x.id === id ? next : x);
    const home_t = state.teamById[m.home_team_id]?.tag || "?";
    const away_t = state.teamById[m.away_team_id]?.tag || "?";
    const msg = `score: ${home_t} ${next.home_score ?? "-"}-${next.away_score ?? "-"} ${away_t} (${next.status})`;
    try {
      await pushUpdate("data/schedule.json", newSchedule, msg);
      state.matches = newSchedule;
      card.classList.add("saved");
      btn.textContent = "Saved — live in ~30s";
      setTimeout(() => { btn.disabled = false; btn.textContent = "Save match"; card.classList.remove("saved"); }, 2400);
      toast("Saved", "good");
    } catch (err) {
      btn.disabled = false; btn.textContent = "Save match";
      card.classList.add("error");
      setTimeout(() => card.classList.remove("error"), 2400);
      toast(err.message || "Save failed", "bad");
    }
  };
}

function renderStandings() {
  const list = $("#standingsList");
  const sorted = [...state.standings].sort((a,b) => b.kills - a.kills);
  list.innerHTML = sorted.map((row, i) => {
    const team = state.teamById[row.team_id] || { name: row.team_id };
    return `
      <div class="standings-row" data-team="${row.team_id}">
        <div class="rank">${i+1}</div>
        <div class="team-name">${escapeHtml(team.name)}</div>
        <input class="stat-input" inputmode="numeric" type="number" data-field="kills" value="${row.kills}" aria-label="kills">
        <input class="stat-input" inputmode="numeric" type="number" data-field="total" value="${row.total}" aria-label="total">
        <span></span>
      </div>`;
  }).join("");
}

async function saveStandings() {
  const btn = $("#saveStandingsBtn");
  btn.disabled = true; btn.textContent = "Saving…";
  const updated = state.standings.map(row => {
    const el = document.querySelector(`[data-team="${row.team_id}"]`);
    if (!el) return row;
    return {
      ...row,
      kills: +el.querySelector('[data-field=kills]').value || 0,
      total: +el.querySelector('[data-field=total]').value || 0
    };
  });
  try {
    await pushUpdate("data/standings.json", updated, "standings: bulk update");
    state.standings = updated;
    document.querySelectorAll(".standings-row").forEach(r => r.classList.add("saved"));
    btn.textContent = "Saved — live in ~30s";
    setTimeout(() => { btn.disabled = false; btn.textContent = "Save standings"; document.querySelectorAll(".standings-row").forEach(r => r.classList.remove("saved")); }, 2400);
    toast("Standings saved", "good");
  } catch (err) {
    btn.disabled = false; btn.textContent = "Save standings";
    toast(err.message || "Save failed", "bad");
  }
}

async function pushUpdate(file, content, message) {
  const res = await fetch("/api/update", {
    method: "POST",
    headers: { "content-type": "application/json", "X-Admin-Code": state.code },
    body: JSON.stringify({ file, content, message })
  });
  if (res.status === 401) {
    sessionStorage.removeItem("maida_code");
    state.code = "";
    showGate();
    throw new Error("Wrong passcode");
  }
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Save failed: ${t.slice(0, 120)}`);
  }
  return res.json();
}

function showGate() {
  $("#gate").classList.remove("hidden");
  $("#tabs").style.display = "none";
  $("#whoBar").style.display = "none";
  $("#matchesPane").classList.add("hidden");
  $("#standingsPane").classList.add("hidden");
  setTimeout(() => $("#codeInput")?.focus(), 50);
}

function showApp() {
  $("#gate").classList.add("hidden");
  $("#tabs").style.display = "flex";
  $("#whoBar").style.display = "block";
  switchTab(state.tab);
}

function switchTab(tab) {
  state.tab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  $("#matchesPane").classList.toggle("hidden", tab !== "matches");
  $("#standingsPane").classList.toggle("hidden", tab !== "standings");
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

document.addEventListener("DOMContentLoaded", async () => {
  $("#enterBtn").onclick = async () => {
    const code = $("#codeInput").value.trim();
    if (!code) return;
    const probe = await fetch("/api/auth-check", {
      method: "POST",
      headers: { "X-Admin-Code": code }
    }).catch(() => null);
    if (!probe || probe.status === 401) { toast("Wrong passcode", "bad"); return; }
    if (!probe.ok) { toast("Couldn't reach server", "bad"); return; }
    state.code = code;
    sessionStorage.setItem("maida_code", code);
    try {
      await loadData();
      renderMatches();
      renderStandings();
      showApp();
    } catch (e) {
      toast("Couldn't load data", "bad");
    }
  };
  $("#codeInput").addEventListener("keydown", e => { if (e.key === "Enter") $("#enterBtn").click(); });

  $("#signOut").onclick = () => { sessionStorage.removeItem("maida_code"); state.code = ""; showGate(); };
  document.querySelectorAll(".tab").forEach(t => { t.onclick = () => switchTab(t.dataset.tab); });
  $("#saveStandingsBtn").onclick = saveStandings;

  if (state.code) {
    try {
      await loadData();
      renderMatches();
      renderStandings();
      showApp();
    } catch { showGate(); }
  } else {
    showGate();
  }
});
</script>

</body>
</html>
